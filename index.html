<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor Code Arena</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    font-size: 15px;
    line-height: 1.5;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .hidden { display: none !important; }
  img { display: block; }

  /* ---------- Overlays (auth / admin) ---------- */
  .overlay {
    position: fixed;
    inset: 0;
    background: #f2f2f2;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 300;
    padding: 20px;
  }
  .card {
    background: #fff;
    border: 1px solid #c8c8c8;
    width: 100%;
    max-width: 380px;
    padding: 28px;
  }
  .card.wide { max-width: 560px; }
  .auth-logo { text-align: center; margin-bottom: 14px; }
  .auth-logo img { width: 46px; height: 46px; object-fit: contain; margin: 0 auto; }
  .card h1 { font-size: 17px; font-weight: 600; text-align: center; margin-bottom: 6px; }
  .sub { font-size: 13px; color: #6b6b6b; text-align: center; margin-bottom: 20px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: #555; margin-bottom: 5px; }
  .field input, .broadcast-input {
    width: 100%;
    border: 1px solid #c4c4c4;
    background: #fff;
    padding: 10px;
    font-size: 14px;
    font-family: inherit;
    color: #1a1a1a;
    border-radius: 0;
  }
  .field input:focus, .broadcast-input:focus { outline: none; border-color: #1a1a1a; }
  .btn-primary {
    width: 100%;
    background: #1a1a1a;
    color: #fff;
    border: none;
    padding: 11px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    border-radius: 0;
  }
  .btn-primary:hover { background: #000; }
  .btn-primary:disabled { background: #9a9a9a; cursor: not-allowed; }
  .btn-ghost {
    background: transparent;
    border: 1px solid #c4c4c4;
    color: #1a1a1a;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    border-radius: 0;
  }
  .btn-ghost:hover { background: #f0f0f0; }
  .form-status {
    margin-top: 12px;
    font-size: 13px;
    color: #7a1f1f;
    text-align: center;
    min-height: 16px;
  }
  .admin-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .admin-head h1 { text-align: left; margin: 0; }
  .broadcast-input { min-height: 170px; resize: vertical; margin-bottom: 14px; }

  .card.wide { max-height: 92vh; overflow-y: auto; }

  .logs-section {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid #e0e0e0;
  }
  .logs-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .logs-title { font-size: 13px; font-weight: 600; color: #2a2a2a; }
  .log-filter {
    border: 1px solid #c4c4c4;
    background: #fff;
    padding: 4px 6px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 0;
    color: #1a1a1a;
  }
  .log-filter:focus { outline: none; border-color: #1a1a1a; }
  .log-box {
    background: #fafafa;
    border: 1px solid #d8d8d8;
    height: 230px;
    overflow-y: auto;
    font-family: "SF Mono", Consolas, "Courier New", monospace;
    font-size: 11.5px;
    line-height: 1.5;
    color: #2a2a2a;
  }
  .log-line {
    padding: 5px 9px;
    border-bottom: 1px solid #efefef;
    word-break: break-word;
  }
  .log-time { color: #8a8a8a; margin-right: 6px; }
  .log-tag {
    display: inline-block;
    min-width: 48px;
    font-weight: 600;
    margin-right: 6px;
    color: #555;
  }
  .log-error .log-tag { color: #7a1f1f; }
  .log-success .log-tag { color: #2f5d3a; }
  .log-warn .log-tag { color: #7a5b00; }
  .log-cat {
    color: #9a9a9a;
    margin-right: 6px;
    text-transform: lowercase;
  }
  .log-msg { color: #1a1a1a; }
  .log-detail {
    margin-top: 3px;
    padding: 4px 6px;
    background: #f0f0f0;
    border-left: 2px solid #c4c4c4;
    color: #555;
    white-space: pre-wrap;
    overflow-wrap: break-word;
  }
  .log-error .log-detail { border-left-color: #7a1f1f; }
  .log-empty { padding: 12px; text-align: center; color: #9a9a9a; }
  .logs-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  /* ---------- Sidebar drawer ---------- */
  .backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 150;
  }
  .sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 268px;
    background: #fafafa;
    border-right: 1px solid #c8c8c8;
    transform: translateX(-100%);
    transition: transform 0.18s ease;
    z-index: 200;
    display: flex;
    flex-direction: column;
  }
  body.sidebar-open .sidebar { transform: translateX(0); }
  .sb-action {
    margin: 12px;
    padding: 10px;
    border: 1px solid #c4c4c4;
    background: #fff;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    text-align: left;
    color: #1a1a1a;
    border-radius: 0;
  }
  .sb-action:hover { background: #f0f0f0; }
  .logout-btn { text-align: center; margin-top: auto; }
  .chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px;
  }
  .chat-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 9px 8px;
    margin-bottom: 2px;
    border: 1px solid transparent;
    cursor: pointer;
  }
  .chat-item:hover { background: #f0f0f0; }
  .chat-item.active { background: #e9e9e9; border-color: #d0d0d0; }
  .chat-title {
    font-size: 13px;
    color: #2a2a2a;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
  }
  .chat-delete {
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 2px;
    opacity: 0.5;
    flex-shrink: 0;
    display: flex;
  }
  .chat-delete:hover { opacity: 1; }
  .chat-delete img { width: 16px; height: 16px; }
  .chat-list-empty { font-size: 12px; color: #888; padding: 8px; text-align: center; }

  /* ---------- App layout ---------- */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .header {
    height: 52px;
    border-bottom: 1px solid #e0e0e0;
    background: #fff;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 12px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .icon-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 6px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .icon-btn img { width: 22px; height: 22px; }
  .hamburger {
    width: 20px;
    height: 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .hamburger span {
    display: block;
    width: 100%;
    height: 2px;
    background: #1a1a1a;
  }
  .brand {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
    min-width: 0;
  }
  .brand-logo { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; }
  .brand-name {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .model-select {
    border: 1px solid #c4c4c4;
    background: #fff;
    padding: 7px 8px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    max-width: 190px;
    border-radius: 0;
    color: #1a1a1a;
  }
  .model-select:focus { outline: none; border-color: #1a1a1a; }

  .main {
    flex: 1;
    overflow: hidden;
    display: flex;
    justify-content: center;
    background: #fff;
  }
  .messages {
    width: 100%;
    max-width: 820px;
    height: 100%;
    overflow-y: auto;
    padding: 22px 20px;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    color: #6b6b6b;
  }
  .empty-state img { width: 54px; height: 54px; object-fit: contain; margin-bottom: 16px; opacity: 0.85; }
  .empty-state h2 { font-size: 16px; font-weight: 600; color: #2a2a2a; margin-bottom: 6px; }
  .empty-state p { font-size: 13px; max-width: 340px; }

  /* ---------- Messages ---------- */
  .msg { padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
  .msg:last-child { border-bottom: none; }
  .msg-header {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    font-weight: 600;
    color: #555;
    margin-bottom: 7px;
  }
  .msg-header .brand-icon, .msg-header .alert-icon { width: 16px; height: 16px; object-fit: contain; }
  .msg-content {
    font-size: 15px;
    color: #1a1a1a;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .md-text { white-space: pre-wrap; }
  .inline-code {
    background: #f1f1f1;
    border: 1px solid #e2e2e2;
    padding: 1px 5px;
    font-family: "SF Mono", Consolas, "Courier New", monospace;
    font-size: 13px;
  }

  .msg.system .msg-system-box {
    background: #f3f3f3;
    border-left: 3px solid #9a9a9a;
    padding: 10px 12px;
  }
  .msg.system.error .msg-system-box {
    background: #f7eded;
    border-left: 3px solid #7a1f1f;
  }

  /* ---------- Code blocks (VS Code dark) ---------- */
  .code-block {
    background: #1e1e1e;
    margin: 12px 0;
    border: 1px solid #1a1a1a;
  }
  .code-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #2d2d2d;
    border-bottom: 1px solid #3a3a3a;
    padding: 6px 10px;
  }
  .code-lang {
    color: #9aa0a6;
    font-size: 11px;
    font-family: "SF Mono", Consolas, "Courier New", monospace;
    text-transform: lowercase;
  }
  .copy-btn {
    background: transparent;
    color: #cfcfcf;
    border: 1px solid #444;
    padding: 3px 9px;
    font-size: 11px;
    cursor: pointer;
    font-family: "SF Mono", Consolas, "Courier New", monospace;
    border-radius: 0;
  }
  .copy-btn:hover { background: #3a3a3a; color: #fff; }
  .code-block pre {
    margin: 0;
    padding: 12px;
    overflow-x: auto;
  }
  .code-block code {
    font-family: "SF Mono", Consolas, "Courier New", monospace;
    font-size: 13px;
    color: #d4d4d4;
    line-height: 1.55;
    white-space: pre;
  }

  /* ---------- Composer ---------- */
  .composer {
    border-top: 1px solid #e0e0e0;
    background: #fff;
    padding: 12px 20px 16px;
    flex-shrink: 0;
    display: flex;
    justify-content: center;
  }
  .composer-inner {
    width: 100%;
    max-width: 820px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    border: 1px solid #c4c4c4;
    padding: 8px;
  }
  .composer-input {
    flex: 1;
    border: none;
    resize: none;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.5;
    max-height: 200px;
    background: transparent;
    color: #1a1a1a;
    outline: none;
    padding: 4px;
  }
  .send-btn {
    background: #1a1a1a;
    border: none;
    padding: 9px 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border-radius: 0;
  }
  .send-btn img { width: 18px; height: 18px; }
  .send-btn:disabled { background: #9a9a9a; cursor: not-allowed; }

  /* ---------- Misc ---------- */
  .loading-header { color: #8a8a8a; font-weight: 600; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
  .loading-header { animation: pulse 1.2s ease-in-out infinite; }

  @media (max-width: 560px) {
    .brand-name { display: none; }
    .model-select { max-width: 150px; }
    .messages { padding: 16px 14px; }
  }
</style>
</head>
<body>

  <!-- Authorization / Registration overlay -->
  <div id="authOverlay" class="overlay">
    <div class="card">
      <div class="auth-logo"><img src="https://i.ibb.co.com/jv6fcQPn/181-20260624015724.png" alt="ECArena"></div>
      <h1>Авторизация / Регистрация</h1>
      <p class="sub">Введите данные для входа или создания аккаунта.</p>
      <div class="field">
        <label for="loginInput">Имя пользователя</label>
        <input id="loginInput" type="text" autocomplete="off" spellcheck="false">
      </div>
      <div class="field">
        <label for="passwordInput">Пароль</label>
        <input id="passwordInput" type="password" autocomplete="off">
      </div>
      <button id="authBtn" class="btn-primary">Войти / Создать аккаунт</button>
      <div id="authError" class="form-status"></div>
    </div>
  </div>

  <!-- Hidden admin panel overlay -->
  <div id="adminOverlay" class="overlay hidden">
    <div class="card wide">
      <div class="admin-head">
        <h1>Панель Администратора ECArena</h1>
        <button id="adminClose" class="btn-ghost">Закрыть</button>
      </div>
      <p class="sub" style="text-align:left;">Сообщение будет принудительно добавлено во все чаты всех зарегистрированных пользователей.</p>
      <textarea id="broadcastInput" class="broadcast-input" placeholder="Текст рассылки"></textarea>
      <button id="broadcastBtn" class="btn-primary">Разослать всем</button>
      <div id="broadcastStatus" class="form-status"></div>

      <div class="logs-section">
        <div class="logs-head">
          <span class="logs-title">Логи системы</span>
          <select id="logFilter" class="log-filter" title="Фильтр">
            <option value="all">Все</option>
            <option value="request">Запросы</option>
            <option value="response">Ответы</option>
            <option value="chat">Чат</option>
            <option value="auth">Авторизация</option>
            <option value="broadcast">Рассылка</option>
          </select>
        </div>
        <div id="logBox" class="log-box"></div>
        <div class="logs-actions">
          <button id="logRefreshBtn" class="btn-ghost" type="button">Обновить</button>
          <button id="logCopyBtn" class="btn-ghost" type="button">Копировать логи</button>
          <button id="logClearBtn" class="btn-ghost" type="button">Очистить</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Sidebar backdrop + drawer -->
  <div id="backdrop" class="backdrop hidden"></div>
  <aside id="sidebar" class="sidebar">
    <button id="newChatBtn" class="sb-action">+ Новый чат</button>
    <div id="chatList" class="chat-list"></div>
    <button id="logoutBtn" class="sb-action logout-btn">Выйти</button>
  </aside>

  <!-- App -->
  <div class="app">
    <header class="header">
      <button id="menuBtn" class="icon-btn" title="Меню" aria-label="Меню">
        <span class="hamburger"><span></span><span></span><span></span></span>
      </button>
      <div class="brand">
        <img src="https://i.ibb.co.com/jv6fcQPn/181-20260624015724.png" class="brand-logo" alt="ECArena">
        <span class="brand-name">Editor Code Arena</span>
      </div>
      <select id="modelSelect" class="model-select" title="Модель"></select>
    </header>

    <main class="main">
      <div id="messages" class="messages"></div>
    </main>

    <footer class="composer">
      <div class="composer-inner">
        <textarea id="messageInput" class="composer-input" rows="1"
          placeholder="Сообщение... (Enter — отправить, Shift+Enter — новая строка)"></textarea>
<button id="sendBtn" class="send-btn" title="Отправить">
        <img src="https://i.ibb.co.com/r2TPfZn3/182-20260624020605.png" alt="Отправить">
      </button>
      </div>
    </footer>
  </div>

  <script type="module" src="app.js"></script>
</body>
 </html>
