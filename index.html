<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor Code Arena</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      color: #111;
      background: #fff;
      overflow: hidden;
    }

    button {
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
    }

    /* ===== LAYOUT ===== */
    #app {
      display: flex;
      height: 100vh;
      width: 100vw;
      position: relative;
      overflow: hidden;
    }

    /* ===== SIDEBAR ===== */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: #f5f5f5;
      border-right: 1px solid #ccc;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 200;
      transform: translateX(-261px);
      transition: transform 0.2s ease;
    }

    #sidebar.open {
      transform: translateX(0);
    }

    #sidebar-header {
      padding: 12px 10px;
      border-bottom: 1px solid #ccc;
    }

    #btn-new-chat {
      width: 100%;
      padding: 7px 10px;
      background: #fff;
      border: 1px solid #999;
      color: #111;
      text-align: left;
      font-size: 13px;
      letter-spacing: 0.01em;
    }

    #btn-new-chat:hover {
      background: #e8e8e8;
    }

    #chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 7px 10px;
      cursor: pointer;
      border-bottom: 1px solid #e5e5e5;
      gap: 6px;
    }

    .chat-item:hover {
      background: #e5e5e5;
    }

    .chat-item.active {
      background: #ddd;
    }

    .chat-item-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      color: #222;
    }

    .chat-item-delete {
      background: none;
      border: none;
      padding: 2px 4px;
      color: #888;
      font-size: 13px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-item-delete:hover {
      color: #c00;
    }

    /* delete icon — SVG inline, no emoji */
    .icon-trash {
      width: 14px;
      height: 14px;
      display: block;
    }

    /* SIDEBAR PROFILE */
    #sidebar-profile {
      border-top: 1px solid #ccc;
      padding: 10px;
    }

    #btn-google-signin {
      width: 100%;
      padding: 7px 10px;
      background: #fff;
      border: 1px solid #999;
      color: #111;
      font-size: 13px;
      text-align: center;
    }

    #btn-google-signin:hover {
      background: #e8e8e8;
    }

    #profile-info {
      display: none;
    }

    #profile-info.visible {
      display: block;
    }

    #profile-name {
      font-size: 12px;
      color: #333;
      margin-bottom: 6px;
      word-break: break-all;
      font-weight: 600;
    }

    #profile-email {
      font-size: 11px;
      color: #555;
      margin-bottom: 8px;
      word-break: break-all;
    }

    #btn-signout {
      width: 100%;
      padding: 6px 10px;
      background: #fff;
      border: 1px solid #999;
      color: #111;
      font-size: 13px;
    }

    #btn-signout:hover {
      background: #e8e8e8;
    }

    /* ===== SIDEBAR OVERLAY ===== */
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 199;
    }

    #sidebar-overlay.visible {
      display: block;
    }

    /* ===== MAIN AREA ===== */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    /* ===== HEADER ===== */
    #header {
      display: flex;
      align-items: center;
      padding: 0 12px;
      height: 48px;
      border-bottom: 1px solid #ccc;
      background: #fff;
      flex-shrink: 0;
      gap: 10px;
    }

    #btn-menu {
      background: none;
      border: none;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #btn-menu:hover {
      background: #eee;
    }

    /* Menu icon SVG */
    .icon-menu {
      width: 20px;
      height: 20px;
      display: block;
    }

    #header-title {
      flex: 1;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #111;
      white-space: nowrap;
    }

    /* MODEL SELECTOR */
    #model-selector-wrap {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #model-icon {
      width: 22px;
      height: 22px;
      object-fit: contain;
      display: block;
      /* СЮДА ВСТАВЬ BASE64 ДЛЯ ЛОГОТИПА МОДЕЛИ ЧЕРЕЗ JS (динамически) */
    }

    #model-select {
      font-size: 13px;
      padding: 4px 6px;
      border: 1px solid #aaa;
      background: #fff;
      color: #111;
      cursor: pointer;
      max-width: 180px;
    }

    /* ===== CHAT WINDOW ===== */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* AUTH NOTICE */
    #auth-notice {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      color: #555;
      font-size: 14px;
    }

    #auth-notice p {
      margin-bottom: 10px;
      color: #333;
    }

    #auth-notice.hidden {
      display: none;
    }

    /* MESSAGES */
    .message {
      padding: 10px 16px;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      line-height: 1.6;
    }

    .message-user {
      background: #fff;
      border-bottom: 1px solid #ececec;
    }

    .message-user .msg-label {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .message-user .msg-body {
      color: #111;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message-assistant {
      background: #fafafa;
      border-bottom: 1px solid #ececec;
    }

    .message-assistant .msg-label {
      font-size: 11px;
      font-weight: 700;
      color: #888;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .message-assistant .msg-label img {
      width: 14px;
      height: 14px;
      object-fit: contain;
    }

    .message-assistant .msg-body {
      color: #111;
      word-break: break-word;
    }

    /* SYSTEM MESSAGE */
    .message-system {
      background: #fff8e1;
      border-left: 3px solid #bba800;
      border-bottom: 1px solid #ececec;
    }

    .message-system .msg-label {
      font-size: 11px;
      font-weight: 700;
      color: #7a6800;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .message-system .msg-body {
      color: #333;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* CODE BLOCK */
    .code-block-wrap {
      position: relative;
      margin: 10px 0;
      background: #1e1e1e;
      border: 1px solid #444;
    }

    .code-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 10px;
      background: #2d2d2d;
      border-bottom: 1px solid #444;
    }

    .code-block-lang {
      font-size: 11px;
      color: #aaa;
      font-family: "Courier New", Courier, monospace;
      text-transform: lowercase;
    }

    .btn-copy-code {
      font-size: 11px;
      background: none;
      border: 1px solid #555;
      color: #bbb;
      padding: 2px 8px;
      cursor: pointer;
    }

    .btn-copy-code:hover {
      background: #444;
      color: #fff;
    }

    pre.code-block {
      margin: 0;
      padding: 12px 14px;
      overflow-x: auto;
      background: #1e1e1e;
    }

    pre.code-block code {
      font-family: "Courier New", Courier, monospace;
      font-size: 13px;
      color: #d4d4d4;
      white-space: pre;
      display: block;
    }

    /* INLINE CODE */
    .msg-body code:not(.code-block code) {
      background: #f0f0f0;
      border: 1px solid #ddd;
      font-family: "Courier New", Courier, monospace;
      font-size: 12px;
      padding: 1px 4px;
      color: #c00;
    }

    /* TYPING INDICATOR */
    #typing-indicator {
      display: none;
      padding: 10px 16px;
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
      color: #888;
      font-size: 13px;
      font-style: italic;
    }

    #typing-indicator.visible {
      display: block;
    }

    /* ===== INPUT AREA ===== */
    #input-area {
      border-top: 1px solid #ccc;
      background: #fff;
      padding: 10px 12px;
      flex-shrink: 0;
    }

    #input-area.locked {
      display: none;
    }

    #input-form {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 820px;
      margin: 0 auto;
    }

    #user-input {
      flex: 1;
      resize: none;
      border: 1px solid #aaa;
      padding: 8px 10px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      max-height: 200px;
      overflow-y: auto;
      color: #111;
      background: #fff;
      outline: none;
    }

    #user-input:focus {
      border-color: #555;
    }

    #btn-send {
      background: #fff;
      border: 1px solid #999;
      padding: 0;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #btn-send:hover {
      background: #eee;
    }

    #btn-send:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #btn-send img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      display: block;
    }

    /* ===== ADMIN MODAL ===== */
    #admin-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    #admin-modal.visible {
      display: flex;
    }

    #admin-modal-box {
      background: #fff;
      border: 1px solid #888;
      width: 480px;
      max-width: 95vw;
      padding: 20px;
    }

    #admin-modal-title {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 8px;
      color: #111;
    }

    #admin-broadcast-text {
      width: 100%;
      height: 120px;
      resize: vertical;
      border: 1px solid #aaa;
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
      color: #111;
      background: #fff;
      outline: none;
      margin-bottom: 10px;
    }

    #admin-broadcast-text:focus {
      border-color: #555;
    }

    #admin-modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    #btn-admin-send {
      padding: 6px 16px;
      background: #111;
      color: #fff;
      border: none;
      font-size: 13px;
    }

    #btn-admin-send:hover {
      background: #333;
    }

    #btn-admin-close {
      padding: 6px 16px;
      background: #fff;
      color: #111;
      border: 1px solid #999;
      font-size: 13px;
    }

    #btn-admin-close:hover {
      background: #eee;
    }

    #admin-status {
      font-size: 12px;
      color: #555;
      margin-bottom: 8px;
      min-height: 16px;
    }

    /* ===== SCROLLBAR ===== */
    #chat-window::-webkit-scrollbar,
    #chat-list::-webkit-scrollbar,
    #user-input::-webkit-scrollbar,
    pre.code-block::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    #chat-window::-webkit-scrollbar-thumb,
    #chat-list::-webkit-scrollbar-thumb,
    #user-input::-webkit-scrollbar-thumb,
    pre.code-block::-webkit-scrollbar-thumb {
      background: #ccc;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      #model-select {
        max-width: 120px;
        font-size: 12px;
      }

      #header-title {
        font-size: 13px;
      }

      #admin-modal-box {
        width: 95vw;
      }
    }

    /* ===== ERROR MESSAGE BLOCK ===== */
    .message-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 16px 20px;
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
      border-bottom: 1px solid #ececec;
      background: #fff;
      gap: 12px;
    }

    .message-error .error-icon {
      width: 64px;
      height: 64px;
      display: block;
    }

    .message-error .error-text {
      font-size: 15px;
      color: #111;
      text-align: center;
      font-weight: 500;
      max-width: 340px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- SIDEBAR OVERLAY -->
  <div id="sidebar-overlay"></div>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <button id="btn-new-chat">+ Новый чат</button>
    </div>
    <div id="chat-list"></div>
    <div id="sidebar-profile">
      <!-- NOT LOGGED IN -->
      <button id="btn-google-signin">Войти через Google</button>
      <!-- LOGGED IN -->
      <div id="profile-info">
        <div id="profile-name"></div>
        <div id="profile-email"></div>
        <button id="btn-signout">Выйти</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div id="main">

    <!-- HEADER -->
    <header id="header">
      <button id="btn-menu" aria-label="Меню">
        <!-- Inline SVG — три полоски -->
        <svg class="icon-menu" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="4" width="16" height="2" fill="#111"/>
          <rect x="2" y="9" width="16" height="2" fill="#111"/>
          <rect x="2" y="14" width="16" height="2" fill="#111"/>
        </svg>
      </button>

      <span id="header-title">Editor Code Arena</span>

      <div id="model-selector-wrap">
        <img id="model-icon" src="" alt="" />
        <select id="model-select">
          <optgroup label="DeepSeek">
            <option value="deepseek/deepseek-chat">DeepSeek V3</option>
            <option value="deepseek/deepseek-r1">DeepSeek R1</option>
          </optgroup>
          <optgroup label="ChatGPT">
            <option value="openai/gpt-4o">GPT-4o</option>
            <option value="openai/gpt-4o-mini">GPT-4o-mini</option>
            <option value="openai/gpt-4.5-preview">GPT-4.5 (5.5)</option>
            <option value="openai/gpt-4o:online">OSS-20B</option>
          </optgroup>
          <optgroup label="Gemini">
            <option value="google/gemini-flash-1.5">Gemini 1.5 Flash</option>
            <option value="google/gemini-2.5-pro-preview">Gemini 2.5 Pro</option>
          </optgroup>
        </select>
      </div>
    </header>

    <!-- CHAT WINDOW -->
    <div id="chat-window">
      <!-- AUTH NOTICE shown when not logged in -->
      <div id="auth-notice">
        <p>Для использования необходимо войти в аккаунт.</p>
        <button id="btn-google-signin-main" style="padding:7px 18px;border:1px solid #999;background:#fff;font-size:14px;">Войти через Google</button>
      </div>
      <!-- Messages are appended here by JS -->
    </div>

    <!-- TYPING INDICATOR -->
    <div id="typing-indicator">Модель генерирует ответ...</div>

    <!-- INPUT AREA -->
    <div id="input-area" class="locked">
      <form id="input-form">
        <textarea
          id="user-input"
          rows="1"
          placeholder="Введите сообщение... (Shift+Enter для новой строки)"
          autocomplete="off"
          spellcheck="false"
        ></textarea>
        <button type="submit" id="btn-send" disabled>
          <!-- src задаётся из JS (ICON_SEND_B64) -->
          <!-- СЮДА ВСТАВЬ BASE64 ИКОНКУ СТРЕЛКИ ЧЕРЕЗ JS -->
          <img id="send-icon" src="" alt=">" />
        </button>
      </form>
    </div>

  </div><!-- /#main -->

  <!-- ADMIN MODAL -->
  <div id="admin-modal">
    <div id="admin-modal-box">
      <div id="admin-modal-title">Панель Администратора</div>
      <textarea id="admin-broadcast-text" placeholder="Текст рассылки для всех чатов всех пользователей"></textarea>
      <div id="admin-status"></div>
      <div id="admin-modal-actions">
        <button id="btn-admin-close">Закрыть</button>
        <button id="btn-admin-send">Разослать всем</button>
      </div>
    </div>
  </div>

</div><!-- /#app -->

<!-- Firebase via CDN (compat версия для простоты) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- App logic -->
<script src="app.js"></script>
</body>
</html>
